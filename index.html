<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <title>Weryfikator przedawnienia długów</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; }
    label { display: block; margin: 10px 0 5px; }
    input, select, button { width: 100%; padding: 8px; margin: 5px 0; }
    textarea { width: 100%; height: 300px; margin: 10px 0; }
    #wynik { margin: 15px 0; font-weight: bold; }
  </style>
</head>
<body>

  <h1>Weryfikator przedawnienia długów (PL)</h1>

  <label>Typ roszczenia:</label>
  <select id="typRoszczenia">
    <option value="kredyt">Kredyt / karta kredytowa (3 lata)</option>
    <option value="faktura">Faktura / działalność gospodarcza (3 lata)</option>
    <option value="okresowe">Roszczenie okresowe (czynsz, składka, abonament – 3 lata)</option>
    <option value="prywatna">Pożyczone prywatne (bez działalności gospodarczej – 6 lat)</option>
  </select>

  <label>Data wymagalności (np. dzień wymagalności raty / faktury):</label>
  <input type="date" id="dataWymagalnosci" />

  <button onclick="sprawdzPrzedawnienie()">Sprawdź przedawnienie</button>

  <div id="wynik"></div>
  <textarea id="pismo" placeholder="Tutaj pojawi się gotowe pismo do wklejenia"></textarea>

  <script>
    function sprawdzPrzedawnienie() {
      const dataWymagalnosciInput = document.getElementById("dataWymagalnosci").value;
      const typ = document.getElementById("typRoszczenia").value;

      if (!dataWymagalnosciInput) {
        alert("Wpisz datę wymagalności.");
        return;
      }

      const dataWymagalnosci = new Date(dataWymagalnosciInput);
      const dzis = new Date();

      let lata = 6;
      let podtyp = "pożyczenie prywatne (bez działalności gospodarczej)";

      if (["kredyt", "faktura", "okresowe"].includes(typ)) {
        lata = 3;
        if (typ === "kredyt") {
          podtyp = "kredyt / karta kredytowa";
        } else if (typ === "faktura") {
          podtyp = "faktura / działalność gospodarcza";
        } else if (typ === "okresowe") {
          podtyp = "roszczenie okresowe (czynsz, składka, abonament)";
        }
      }

      const rokPrzedawnienia = dataWymagalnosci.getFullYear() + lata;
      const koniecRoku = new Date(rokPrzedawnienia, 11, 31); // 31.12.X

      const wynikEl = document.getElementById("wynik");
      const pismoEl = document.getElementById("pismo");

      if (dzis > koniecRoku) {
        wynikEl.textContent = "Roszczenie jest przedawnione.";
        wynikEl.style.color = "green";
      } else {
        wynikEl.textContent = "Roszczenie nie jest jeszcze przedawnione.";
        wynikEl.style.color = "red";
      }

      // Data w formacie DD.MM.RRRR
      const formatData = (d) => {
        const dd = String(d.getDate()).padStart(2, "0");
        const mm = String(d.getMonth() + 1).padStart(2, "0");
        const yyyy = d.getFullYear();
        return `${dd}.${mm}.${yyyy}`;
      };

      const dataWymagalnosciFormatted = formatData(dataWymagalnosci);
      const koniecRokuFormatted = formatData(koniecRoku);

      const trescPisma = `Niniejszym zawiadamiam, że dochodzone wobec mnie roszczenie z tytułu ${podtyp}, uległo przedawnieniu na mocy art. 118 Kodeksu cywilnego.

Roszczenie z dnia ${dataWymagalnosciFormatted} r. stało się wymagalne dnia ${dataWymagalnosciFormatted} r. Zgodnie z art. 118 KC, dla roszczeń z działalności gospodarczej / roszczeń okresowych termin przedawnienia wynosi 3 lata, a dla ponadto określonych roszczeń (np. niektórych pożyczeń prywatnych) – 6 lat. Termin przedawnienia upływa zakończeniem roku kalendarzowego, tj. 31 grudnia ${koniecRokuFormatted} r.

Ponieważ od dnia wymagalności upłynął okres dłuższy niż ${lata} lata, roszczenie uległo przedawnieniu.

W związku z powyższym:
- nie uznaję dochodzonego roszczenia w zakresie, w jakim jest przedawnione,
- wnioskuje przed sądem/firmą
